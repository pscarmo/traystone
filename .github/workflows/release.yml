name: Release with Artifact Attestation

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate artifact attestation for main.js
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: main.js

      - name: Upload main.js to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
